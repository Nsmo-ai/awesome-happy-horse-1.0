<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="line3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="86" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800">Happy Horse Timeline Signal Map</text>
  <text x="70" y="122" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600">Benchmark visibility -> social amplification -> trust questions -> release clarity gap</text>

  <rect x="72" y="182" width="260" height="130" rx="22" fill="url(#line1)" filter="url(#shadow)"/>
  <text x="98" y="220" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Stage 1</text>
  <text x="98" y="252" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Benchmark Visibility</text>
  <text x="98" y="286" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Artificial Analysis gives the model public visibility.</text>

  <rect x="372" y="182" width="260" height="130" rx="22" fill="url(#line2)" filter="url(#shadow)"/>
  <text x="398" y="220" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Stage 2</text>
  <text x="398" y="252" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Social Amplification</text>
  <text x="398" y="286" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">X and Reddit spread comparisons, hopes, and skepticism.</text>

  <rect x="672" y="182" width="260" height="130" rx="22" fill="url(#line3)" filter="url(#shadow)"/>
  <text x="698" y="220" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Stage 3</text>
  <text x="698" y="252" fill="#DCFCE7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Interpretation Pressure</text>
  <text x="698" y="286" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Readers ask whether the story is bigger than the release surface.</text>

  <rect x="972" y="182" width="156" height="130" rx="22" fill="#1E293B" filter="url(#shadow)"/>
  <text x="994" y="220" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Stage 4</text>
  <text x="994" y="252" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Repository Work</text>
  <text x="994" y="286" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500">Facts, claims, watchlists, and caution layers.</text>

  <path d="M332 247 H362" stroke="#64748B" stroke-width="5"/>
  <path d="M632 247 H662" stroke="#64748B" stroke-width="5"/>
  <path d="M932 247 H962" stroke="#64748B" stroke-width="5"/>

  <rect x="72" y="390" width="1056" height="252" rx="28" fill="#0B1220" stroke="#334155" stroke-width="2"/>
  <text x="104" y="436" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">What to monitor over time</text>

  <text x="104" y="484" fill="#A5F3FC" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Benchmark shifts</text>
  <text x="104" y="516" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Rank, Elo, sample counts, with-audio vs no-audio leadership.</text>

  <text x="104" y="564" fill="#A5F3FC" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Access claims</text>
  <text x="104" y="596" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">API timing, local-run claims, open-weights rumors, site legitimacy.</text>

  <text x="620" y="484" fill="#A5F3FC" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Discussion shifts</text>
  <text x="620" y="516" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Which comparison frame dominates and which social claims spread fastest.</text>

  <text x="620" y="564" fill="#A5F3FC" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Trust shifts</text>
  <text x="620" y="596" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">Mislabeled clips, attribution doubts, and changing public confidence.</text>

  <rect x="72" y="52" width="208" height="36" rx="18" fill="#1D4ED8"/>
  <text x="96" y="76" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">TIMELINE READING AID</text>
</svg>
